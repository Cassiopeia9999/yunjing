<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Tile Layer with AMap</title>
    <style>
        #map-container {
            width: 100%;
            height: 600px;
        }
    </style>
</head>
<body>
    <div id="map-container"></div>

    <!-- 引入高德地图 SDK -->
    <script src="https://webapi.amap.com/maps?v=2.0&key=4d4cd722ad14d87adee048448ad913cc&plugin=AMap.GeoJSON"></script>
	<script src="https://unpkg.com/gcoord/dist/gcoord.global.prod.js"></script>
    <script>
        // 初始化地图
        const map = new AMap.Map('map-container', {
            zooms: [2,27], // 初始缩放级别
			zoom: 25,
			optimalZoom: 27,
            center: [103.98198524355136, 30.656042039844614], // 初始中心点坐标（北京）
        });

	// 引入 WGS84 到 GCJ02 的转换库
	// 可以使用 coordtransform 或其他开源库
	function wgs84ToGcj02(lng, lat) {
		var result = gcoord.transform(
		  [lng, lat],    // 经纬度坐标
		  gcoord.WGS84,               // 当前坐标系
		  gcoord.GCJ02                 // 目标坐标系
		);
		return { lng: result[0], lat: result[1] };
	}
		
	// GCJ-02 到 WGS-84 的坐标转换方法
	function gcj02_To_wgs84(lng, lat) {
		var result = gcoord.transform(
		  [lng, lat],    // 经纬度坐标
		  gcoord.GCJ02,               // 当前坐标系
		  gcoord.WGS84                 // 目标坐标系
		);
		return { lng: result[0], lat: result[1] };
	}

	// 计算瓦片的范围
	function getTileBounds(x, y, z) {
		const n = Math.pow(2, z);
		const lon1 = (x / n) * 360.0 - 180.0;
		const lat1 = (Math.atan(Math.sinh(Math.PI * (1 - 2 * (y + 1) / n)))) * 180.0 / Math.PI;
		const lon2 = ((x + 1) / n) * 360.0 - 180.0;
		const lat2 = (Math.atan(Math.sinh(Math.PI * (1 - 2 * y / n)))) * 180.0 / Math.PI;
		return { minLon: lon1, minLat: lat1, maxLon: lon2, maxLat: lat2 };
	}
	// 下载瓦片
	function loadTile(url) {
		return new Promise((resolve, reject) => {
			const img = new Image();
			img.crossOrigin = "Anonymous";
			img.onload = () => resolve(img);
			img.onerror = () => reject(new Error(`Failed to load tile: ${url}`));
			img.src = url;
		});
	}

	
		/**
	 * 将经纬度转换为瓦片坐标 (x, y)
	 * @param {number} lon - 经度
	 * @param {number} lat - 纬度
	 * @param {number} z - 瓦片层级 (缩放级别)
	 * @returns {Object} - 包含 x 和 y 坐标的对象
	 */
	function lonLatToTileXY(lon, lat, z) {
		// 计算每层的瓦片总数
		const n = Math.pow(2, z);

		// 将经度转换为瓦片的 x 坐标
		const x = Math.floor((lon + 180) / 360 * n);

		// 将纬度转换为瓦片的 y 坐标
		const latRad = lat * Math.PI / 180; // 将纬度转换为弧度
		const y = Math.floor((1 - Math.log(Math.tan(latRad) + 1 / Math.cos(latRad)) / Math.PI) / 2 * n);

		return { x, y };
	}
	
	/**
	 * 将经纬度转换为全局像素坐标
	 * @param {number} lon - 经度
	 * @param {number} lat - 纬度
	 * @param {number} z - 缩放级别
	 * @returns {Object} - 包含全局像素坐标 (xp, yp) 的对象
	 */
	function lonLatToGlobalPixelXY(lon, lat, z) {
		const n = Math.pow(2, z) * 256; // 当前层级的全局像素范围

		// 计算全局像素坐标 xp
		const xp = Math.floor((lon + 180) / 360 * n);

		// 计算全局像素坐标 yp
		const latRad = lat * Math.PI / 180; // 纬度转换为弧度
		const yp = Math.floor((1 - Math.log(Math.tan(latRad) + 1 / Math.cos(latRad)) / Math.PI) / 2 * n);

		return { xp, yp };
	}

	// 创建自定义瓦片图层
	var layer = new AMap.TileLayer.Flexible({
		cacheSize: 300,
		zIndex: 3,
		tileSize: 256,
		dataZooms:[2, 27],
		createTile: function (x, y, z, success, fail) {
			const canvas = document.createElement('canvas');
                canvas.width = canvas.height = 256;
                const ctx = canvas.getContext('2d');

                // 获取当前 GCJ-02 瓦片的范围
                const bounds = getTileBounds(x, y, z);

                // 将 GCJ-02 范围转换为 WGS-84 范围
                const wgsTL = gcj02_To_wgs84(bounds.minLon, bounds.maxLat);
				let test = wgs84ToGcj02(wgsTL.lng, wgsTL.lat);
				
                const wgsRD = gcj02_To_wgs84(bounds.maxLon, bounds.minLat);

                // 计算 WGS-84 瓦片的 x, y 范围
				let tileTL = lonLatToTileXY(wgsTL.lng, wgsTL.lat, z);
				let tileRD = lonLatToTileXY(wgsRD.lng, wgsRD.lat, z);

                // 下载并拼接所有相关的 WGS-84 瓦片
                const promises = [];
                for (let wgsX = tileTL.x; wgsX <= tileRD.x; wgsX++) {
                    for (let wgsY = tileTL.y; wgsY <= tileRD.y; wgsY++) {
						 const wgsBounds = getTileBounds(wgsX, wgsY, z);
						//const tieCoord = gcj02_To_wgs84(bounds.minLon, bounds.maxLat);
						//let picTL = lonLatToGlobalPixelXY(wgsBounds.minLon, wgsBounds.maxLat, z);
						//let tileTL = lonLatToGlobalPixelXY(tieCoord.lng, tieCoord.lat, z);
						
                        const url = `https://home.gm-robot.com:9104/image/103919/image/tile/${z}/${wgsX}/${wgsY}.png`;
                        promises.push(
                            loadTile(url)
                                .then(img => ({ img, wgsX, wgsY }))
                                .catch(() => {
								console.log(wgsX, wgsY);
								}) // 忽略加载失败的瓦片
                        );
                    }
                }

                // 等待所有瓦片下载完成
                Promise.all(promises).then(results => {
                    results.forEach(result => {
                        if (result) {
                            const { img, wgsX, wgsY } = result;
                            // 计算当前 WGS-84 瓦片的范围
                            const wgsBounds = getTileBounds(wgsX, wgsY, z);
                            //const tieCoord = gcj02_To_wgs84(bounds.minLon, bounds.maxLat);
							//let picTL = lonLatToGlobalPixelXY(wgsBounds.minLon, wgsBounds.maxLat, z);
							//let tileTL = lonLatToGlobalPixelXY(tieCoord.lng, tieCoord.lat, z);
							//转到高德坐标系下计算
							const picPoint = wgs84ToGcj02(wgsBounds.minLon, wgsBounds.maxLat);
							const picPointRD = wgs84ToGcj02(wgsBounds.maxLon, wgsBounds.minLat);
							let picTL = lonLatToGlobalPixelXY(picPoint.lng, picPoint.lat, z);
							let tileTL1 = lonLatToGlobalPixelXY(bounds.minLon, bounds.maxLat, z);
							let picRD = lonLatToGlobalPixelXY(picPointRD.lng, picPointRD.lat, z);
							let tileRD = lonLatToGlobalPixelXY(bounds.maxLon, bounds.minLat, z);
							
							
							let offsetX = tileTL1.xp - picTL.xp;
							let offsetY = tileTL1.yp - picTL.yp;
							let width = picRD.xp - picTL.xp;
							let height = picRD.yp - picTL.yp;

                            // 绘制瓦片到 Canvas 上
                            ctx.drawImage(img, -offsetX, -offsetY, width+1, height+1);
                        }
                    });
                    success(canvas);
                }).catch(fail);
            }
	});

	// 添加自定义瓦片图层
	map.add(layer);
	
	
	// GeoJSON 数据
        let geojsonData = {
            "type": "Feature",
            "geometry": {
                "coordinates": [
                    [103.98198524355136, 30.656042039844614],
                    [103.98198698978139, 30.65604266501561],
                    [103.98198909922745, 30.65604295325885]
                ],
                "type": "LineString"
            },
            "properties": {
                "date": 1725961256828,
                "severity": "DL_NORMAL",
                "area": 0.07711241970092751,
                "typeName": "表观病害",
                "length": 0.3855620985046375,
                "disCode": "4",
                "archiveId": "",
                "disType": "横向裂缝",
                "imageUrl": "",
                "name": "2.4L-1",
                "id": 1134614,
                "status": "UNCHANGED"
            }
        };

        // 转换坐标
        let coordinates = geojsonData.geometry.coordinates.map(([lon, lat]) => {
            let latlng = wgs84ToGcj02(lon, lat);
            return [latlng.lng, latlng.lat];
        });
		
		geojsonData.geometry.coordinates = coordinates

		const geoJSONLayer = new AMap.GeoJSON({
			geoJSON: {
				type: 'FeatureCollection',
				features: [geojsonData],
			}
			}
		)
		// 将图层添加到地图
        map.add(geoJSONLayer);

        const [zoom, lnglat] = map.getFitZoomAndCenterByOverlays([geoJSONLayer._overlays[0]])
        map.setZoomAndCenter(zoom, lnglat)
        console.log(lnglat)
    </script>
</body>
</html>
